spring:
  application:
    name: events
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  data:
    mongodb:
      uri: mongodb+srv://${MONGO_USER}:${MONGO_PASS}@event-clusters.aumhwxw.mongodb.net/${MONGO_DB}?retryWrites=true&w=majority
      auto-index-creation: true
    # redis:
    #   host: ${REDIS_HOST:localhost}
    #   port: ${REDIS_PORT:6379}
  cache:
    type: none
  mail:
    host: ${SMTP}
    port: 587
    username: ${EMAIL}
    password: ${EMAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

server:
  port: 8080

logging:
  level:
    org:
      springframework:
        data:
          mongodb: DEBUG

app:
  frontend:
    url: "http://localhost:4200/login"

whatsapp:
  provider: mock  # can be changed to twilio, meta, etc.
  api:
    url: ""
    key: ""
